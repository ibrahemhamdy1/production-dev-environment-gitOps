apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  project: default
  source:
    repoURL: https://github.com/example/your-repo.git
    targetRevision: HEAD
    path: k8s/apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true